[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "staticfiles",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "DJ",  # flake8-django
]
ignore = [
    "E501",   # line too long (géré par black)
    "B008",   # do not perform function calls in default arguments
    "B904",   # raise from
]

[tool.ruff.lint.isort]
known-django = ["django"]
known-first-party = ["apps", "core", "shared", "config"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "DJANGO", "FIRSTPARTY", "LOCALFOLDER"]

[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    migrations
  | .venv
  | staticfiles
)/
'''
