# ============================================================
# NGINX — Reverse Proxy principal
# Gère : SSL, CORS, rate limiting, static files, proxy backend
# ============================================================

# ── Rate limiting zones (defined in production.conf) ───
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── Upstream backend (defined in production.conf) ──────
# upstream django_backend {
#     server backend:8000;
#     keepalive 32;
# }
#
# upstream react_frontend {
#     server frontend:3000;
# }

# ── Server HTTP → redirection HTTPS (prod) ───────────────
# Décommentez en production
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── Server principal (HTTP pour dev, HTTPS pour prod) ────
server {
    listen 80;
    # listen 443 ssl http2;  # Activer en production
    server_name localhost;

    # ── SSL (production uniquement) ───────────────────────
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Headers de sécurité ───────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Content-Security-Policy — appliqué à toutes les réponses (frontend + API)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws://localhost:* http://localhost:*; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;  # HTTPS seulement

    # ── Taille maximale des uploads ───────────────────────
    client_max_body_size 20M;

    # ── Timeouts ──────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── API Backend Django ────────────────────────────────
    location /api/ {
        # Rate limiting API
        limit_req zone=api burst=20 nodelay;
        limit_conn addr 20;

        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Pour l'audit trail
        proxy_set_header X-Request-ID $request_id;
    }

    # ── Rate limiting spécial pour le login ───────────────
    location /api/v1/auth/login/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── Routes React admin (avant le catch-all Django admin) ─
    location ~ ^/admin/(roles|permissions|org-structure|functions|grades|system-settings|committee-params|workflow-rules|approval-matrix|user-roles|audit-logs|workflow-designer|approval-history)(/|$) {
        proxy_pass http://react_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Admin Django ──────────────────────────────────────
    location /admin/ {
        # Restreindre l'accès à l'admin en production
        # allow 10.0.0.0/8;  # Réseau interne uniquement
        # deny all;
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Fichiers statiques Django (admin, DRF) ────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Fichiers médias (uploads) ─────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Prometheus Metrics ────────────────────────────────
    location = /metrics {
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Favicon ────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }
    location /api/docs/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $http_host;
    }

    # ── Frontend React (SPA) ──────────────────────────────
    location / {
        proxy_pass http://react_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";  # Pour HMR WebSocket en dev
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
}
