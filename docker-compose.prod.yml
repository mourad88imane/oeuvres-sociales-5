# ============================================================
# DOCKER COMPOSE — Production
# ============================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

name: oeuvres-sociales-prod

services:

  # ── PostgreSQL avec connexion pooler ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oeuvres_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
      TZ: Africa/Algiers
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups:rw
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oeuvres_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ── PgBouncer (connexion pool) ──────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: oeuvres_pgbouncer
    restart: always
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "200"
      PGBOUNCER_DEFAULT_POOL_SIZE: "50"
      PGBOUNCER_MIN_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oeuvres_network

  # ── Redis (Cache + Celery Broker) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oeuvres_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oeuvres_network
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # ── Backend Django (Gunicorn multi-workers) ─────────────
  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-oeuvres-sociales}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
      cache_from:
        - ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-oeuvres-sociales}/backend:latest
    container_name: oeuvres_backend
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/verify/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - oeuvres_network
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 384M

  # ── Celery Worker (concurrents) ─────────────────────────
  celery_worker:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-oeuvres-sociales}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: oeuvres_celery_worker
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - backend_media:/app/media
    depends_on:
      - backend
      - redis
    command: celery -A config worker --loglevel=warning --concurrency=4 --queues=celery,ai,scheduled
    networks:
      - oeuvres_network
    deploy:
      replicas: ${CELERY_REPLICAS:-1}
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M

  # ── Celery Beat (tâches périodiques) ─────────────────────
  celery_beat:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-oeuvres-sociales}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: oeuvres_celery_beat
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - backend
      - redis
    command: celery -A config beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - oeuvres_network

  # ── Frontend React (Nginx SPA) ──────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-oeuvres-sociales}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: production
      cache_from:
        - ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-oeuvres-sociales}/frontend:latest
    container_name: oeuvres_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - oeuvres_network
    deploy:
      replicas: ${FRONTEND_REPLICAS:-1}
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: oeuvres_nginx
    restart: always
    volumes:
      - ./nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - oeuvres_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Sentry (optionnel — activer via .env.production) ────
  # sentry:
  #   image: getsentry/sentry:latest
  #   profiles: [monitoring]

# ── Volumes persistants ───────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_media:
    driver: local
  backend_static:
    driver: local
  nginx_logs:
    driver: local

# ── Réseau interne ────────────────────────────────────────
networks:
  oeuvres_network:
    driver: bridge
    name: oeuvres_network_prod
