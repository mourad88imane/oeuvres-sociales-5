# ============================================================
# GITLAB CI/CD — Oeuvres Sociales
# ============================================================
# Stratégie : test → lint → build → staging → production
# ============================================================

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:latest
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA

stages:
  - validate
  - test
  - build
  - staging
  - production

# ── Cache ─────────────────────────────────────────────────
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - backend/.cache/pip/
    - frontend/node_modules/

# ── Jobs ─────────────────────────────────────────────────

validate:lint-python:
  stage: validate
  image: python:3.12-slim
  before_script:
    - pip install ruff
  script:
    - ruff check backend/ --output-format=gitlab
  rules:
    - changes:
        - backend/**/*.py

validate:lint-frontend:
  stage: validate
  image: node:20-alpine
  before_script:
    - cd frontend && npm ci
  script:
    - cd frontend && npm run lint
  rules:
    - changes:
        - frontend/src/**/*.{ts,tsx}

validate:typecheck:
  stage: validate
  image: node:20-alpine
  before_script:
    - cd frontend && npm ci
  script:
    - cd frontend && npx tsc --noEmit
  rules:
    - changes:
        - frontend/src/**/*.{ts,tsx}

validate:security:
  stage: validate
  image: python:3.12-slim
  before_script:
    - pip install pip-audit bandit
  script:
    - pip-audit -r backend/requirements/production.txt
    - bandit -r backend/ -x backend/tests,backend/.env
  allow_failure: true

test:backend:
  stage: test
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: oeuvres_sociales_test
    POSTGRES_USER: oeuvres_user
    POSTGRES_PASSWORD: oeuvres_password_test
    REDIS_URL: redis://redis:6379/0
    DATABASE_URL: postgres://oeuvres_user:oeuvres_password_test@postgres:5432/oeuvres_sociales_test
    DJANGO_SETTINGS_MODULE: config.settings.test
    SECRET_KEY: test-key-not-secret-12345
    DEBUG: "False"
    DB_NAME: oeuvres_sociales_test
    DB_USER: oeuvres_user
    DB_PASSWORD: oeuvres_password_test
    DB_HOST: postgres
    DB_PORT: "5432"
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libpq-dev
    - pip install -r backend/requirements/production.txt
    - pip install -r backend/requirements/test.txt
  script:
    - cd backend && pytest --cov=. --cov-report=term --cov-report=html -v --junitxml=report.xml
  artifacts:
    reports:
      junit: backend/report.xml
    paths:
      - backend/htmlcov/
    expire_in: 30 days

test:frontend:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend && npm ci
  script:
    - cd frontend && npm run test 2>/dev/null || echo "No tests defined"
  allow_failure: true

build:backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --target production
      --cache-from $BACKEND_IMAGE
      --build-arg BUILDKIT_INLINE_CACHE=1
      -t $BACKEND_IMAGE
      -f docker/backend/Dockerfile
      backend/
    - docker push $BACKEND_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

build:frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --target production
      --cache-from $FRONTEND_IMAGE
      --build-arg BUILDKIT_INLINE_CACHE=1
      -t $FRONTEND_IMAGE
      -f docker/frontend/Dockerfile
      frontend/
    - docker push $FRONTEND_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

deploy:staging:
  stage: staging
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no "$STAGING_HOST" "
      cd /opt/oeuvres-sociales &&
      docker compose -f docker-compose.prod.yml pull &&
      docker compose -f docker-compose.prod.yml up -d --remove-orphans &&
      docker system prune -f
      "
  environment:
    name: staging
    url: https://staging.oeuvres-sociales.dz
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

deploy:production:
  stage: production
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PRODUCTION_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no "$PRODUCTION_HOST" "
      cd /opt/oeuvres-sociales &&
      docker compose -f docker-compose.prod.yml pull &&
      docker compose -f docker-compose.prod.yml up -d --remove-orphans --wait &&
      docker system prune -f &&
      echo 'Deploiement termine' &&
      docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput &&
      docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput --clear
      "
  environment:
    name: production
    url: https://oeuvres-sociales.dz
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual
